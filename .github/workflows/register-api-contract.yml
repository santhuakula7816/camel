name: Register JSON Map Service API

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    tags:
      - "v*"

jobs:
  register:
    runs-on: ubuntu-latest

    env:
      CENTRAL_REGISTRY_URL: http://localhost:8085

    steps:

      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Install jq
      # ------------------------------------------------------------
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ------------------------------------------------------------
      # Determine Environment and Version
      # ------------------------------------------------------------
      - name: Determine environment and version
        id: version
        shell: bash
        run: |

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            ENVIRONMENT="prod"

          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            VERSION="${GITHUB_REF#refs/heads/release/}"
            ENVIRONMENT="uat"

          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            VERSION="main"
            ENVIRONMENT="staging"

          elif [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            VERSION="dev"
            ENVIRONMENT="dev"

          else
            VERSION="snapshot"
            ENVIRONMENT="dev"
          fi

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION"

      # ------------------------------------------------------------
      # Validate Existing Collection
      # ------------------------------------------------------------
      - name: Validate collection file
        shell: bash
        run: |

          echo "📦 Reading existing Postman collection..."

          if [ ! -f "postman/jsonmap.postman_collection.json" ]; then
            echo "❌ postman/jsonmap.postman_collection.json not found"
            exit 1
          fi

          cat postman/jsonmap.postman_collection.json | jq '.info'

          COLLECTION_NAME=$(jq -r '.info.name' postman/jsonmap.postman_collection.json)

          if [ "$COLLECTION_NAME" == "null" ]; then
            echo "❌ Invalid collection structure"
            exit 1
          fi

          echo "✅ Collection file validated"

      # ------------------------------------------------------------
      # Update Collection Name Dynamically
      # ------------------------------------------------------------
      - name: Update Collection Name
        shell: bash
        run: |

          COLLECTION_NAME="jsonmap-service-${{ steps.version.outputs.version }}"

          jq --arg NAME "$COLLECTION_NAME" \
            '.info.name = $NAME' \
            postman/jsonmap.postman_collection.json \
            > updated_collection.json

          echo "--------------------------------------"
          echo "Updated Collection Info"
          echo "--------------------------------------"

          cat updated_collection.json | jq '.info'

          echo "--------------------------------------"

      # ------------------------------------------------------------
      # Create Postman Payload
      # ------------------------------------------------------------
      - name: Create Postman Payload
        shell: bash
        run: |

          jq -n \
            --slurpfile collection updated_collection.json \
            '{collection: $collection[0]}' \
            > postman_payload.json

          echo "--------------------------------------"
          echo "Payload Preview"
          echo "--------------------------------------"

          cat postman_payload.json | jq '.collection.info'

          echo "--------------------------------------"

          echo "✅ Postman payload generated"

      # ------------------------------------------------------------
      # Start Mock Central Registry
      # REMOVE THIS IN REAL SERVER
      # ------------------------------------------------------------
      - name: Start Mock Central Registry
        shell: bash
        run: |

          cat > mock_registry.py << 'EOF'
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json

          class MockRegistry(BaseHTTPRequestHandler):

              def do_POST(self):

                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length).decode('utf-8')

                  print("\n==============================")
                  print("POST Request Received")
                  print("==============================")
                  print("Path:", self.path)
                  print("Body:", body)
                  print("==============================\n")

                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()

                  response = {
                      "status": "success",
                      "mock": True,
                      "path": self.path
                  }

                  self.wfile.write(json.dumps(response).encode())

              def log_message(self, format, *args):
                  return

          print("🚀 Mock Central Registry running on port 8085")

          HTTPServer(("0.0.0.0", 8085), MockRegistry).serve_forever()
          EOF

          nohup python3 mock_registry.py > mock_registry.log 2>&1 &

          sleep 5

          echo "✅ Mock Registry Started"

      # ------------------------------------------------------------
      # FULL AUTOMATED PIPELINE
      # ------------------------------------------------------------
      - name: Register API Pipeline
        shell: bash
        run: |

          curl --fail --show-error --silent \
            -X POST "$CENTRAL_REGISTRY_URL/registry/pipeline/register" \
            -F "apiName=jsonmap-service" \
            -F "description=JSON Mapping Service" \
            -F "gitRepository=${{ github.repository }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "environment=${{ steps.version.outputs.environment }}" \
            -F "baseUrl=http://localhost:8084" \
            -F "breakingChange=false" \
            -F "collectionFile=@updated_collection.json;type=application/json"

          echo "✅ Full Pipeline Completed"

      # ------------------------------------------------------------
      # Sync Collection to Postman
      # SAME VERSION  -> UPDATE
      # NEW VERSION   -> CREATE
      # ------------------------------------------------------------
      - name: Sync Collection to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        shell: bash
        run: |

          echo "📦 Syncing Collection to Postman..."

          COLLECTION_NAME="jsonmap-service-${{ steps.version.outputs.version }}"

          # --------------------------------------------------------
          # SEARCH COLLECTION
          # --------------------------------------------------------

          SEARCH_RESPONSE=$(curl --silent \
            --request GET \
            "https://api.getpostman.com/collections" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}")

          EXISTING_UID=$(echo "$SEARCH_RESPONSE" | jq -r \
            --arg NAME "$COLLECTION_NAME" \
            '.collections[] | select(.name==$NAME) | .uid' | head -1)

          echo "Existing UID: $EXISTING_UID"

          # --------------------------------------------------------
          # UPDATE EXISTING COLLECTION
          # --------------------------------------------------------

          if [ ! -z "$EXISTING_UID" ]; then

            echo "♻️ Updating existing collection..."

            RESPONSE=$(curl --silent \
              --request PUT \
              "https://api.getpostman.com/collections/${EXISTING_UID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @postman_payload.json)

          # --------------------------------------------------------
          # CREATE NEW COLLECTION
          # --------------------------------------------------------

          else

            echo "🆕 Creating new collection..."

            RESPONSE=$(curl --silent \
              --request POST \
              "https://api.getpostman.com/collections?workspace=${POSTMAN_WORKSPACE_ID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @postman_payload.json)

          fi

          echo "--------------------------------------"
          echo "Postman Response"
          echo "--------------------------------------"

          echo "$RESPONSE" | jq '.'

          echo "--------------------------------------"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Postman sync failed"
            exit 1
          fi

          echo "✅ Postman Sync Successful"

      # ------------------------------------------------------------
      # Workflow Completed
      # ------------------------------------------------------------
      - name: Workflow Completed
        run: |
          echo "🎉 API Registration Workflow Completed Successfully"