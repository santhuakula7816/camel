name: Register JSON Map Service API

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    tags:
      - "v*"

jobs:
  register:
    runs-on: ubuntu-latest

    env:
      CENTRAL_REGISTRY_URL: http://localhost:8085

    steps:
      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Install jq
      # ------------------------------------------------------------
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ------------------------------------------------------------
      # Determine Environment and Version
      # ------------------------------------------------------------
      - name: Determine environment and version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            ENVIRONMENT="prod"

          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            VERSION="${GITHUB_REF#refs/heads/release/}"
            ENVIRONMENT="uat"

          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            VERSION="main-$(date +%s)"
            ENVIRONMENT="staging"

          elif [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            VERSION="dev-$(date +%s)"
            ENVIRONMENT="dev"

          else
            VERSION="snapshot-$(date +%s)"
            ENVIRONMENT="dev"
          fi

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION"

      # ------------------------------------------------------------
      # Generate Clean OpenAPI Spec
      # ------------------------------------------------------------
      - name: Generate OpenAPI spec
        shell: bash
        run: |
          cat > fixed_spec.json << 'EOF'
          {
            "openapi": "3.0.3",
            "info": {
              "title": "JSON Map Service API",
              "version": "1.0.0",
              "description": "API for managing JSON mapping data"
            },
            "servers": [
              {
                "url": "http://localhost:8084",
                "description": "Local Development Server"
              }
            ],
            "paths": {
              "/json/getAll": {
                "get": {
                  "tags": [
                    "mapper-json-controller"
                  ],
                  "summary": "Get all JSON mappings",
                  "operationId": "getAllLocations",
                  "responses": {
                    "200": {
                      "description": "List of all JSON mappings",
                      "content": {
                        "application/json": {
                          "schema": {
                            "type": "array",
                            "items": {
                              "$ref": "#/components/schemas/MapperJson"
                            }
                          }
                        }
                      }
                    }
                  }
                }
              },
              "/json/create": {
                "post": {
                  "tags": [
                    "mapper-json-controller"
                  ],
                  "summary": "Create JSON mapping",
                  "operationId": "createRack",
                  "requestBody": {
                    "required": true,
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/MapperJson"
                        }
                      }
                    }
                  },
                  "responses": {
                    "200": {
                      "description": "JSON mapping created successfully",
                      "content": {
                        "application/json": {
                          "schema": {
                            "$ref": "#/components/schemas/MapperJson"
                          }
                        }
                      }
                    }
                  }
                }
              },
              "/json/{id}": {
                "put": {
                  "tags": [
                    "mapper-json-controller"
                  ],
                  "summary": "Update JSON mapping",
                  "operationId": "update",
                  "parameters": [
                    {
                      "name": "id",
                      "in": "path",
                      "required": true,
                      "schema": {
                        "type": "string"
                      }
                    }
                  ],
                  "requestBody": {
                    "required": true,
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/MapperJson"
                        }
                      }
                    }
                  },
                  "responses": {
                    "200": {
                      "description": "JSON mapping updated successfully"
                    }
                  }
                },
                "delete": {
                  "tags": [
                    "mapper-json-controller"
                  ],
                  "summary": "Delete JSON mapping",
                  "operationId": "delete",
                  "parameters": [
                    {
                      "name": "id",
                      "in": "path",
                      "required": true,
                      "schema": {
                        "type": "string"
                      }
                    }
                  ],
                  "responses": {
                    "200": {
                      "description": "JSON mapping deleted successfully"
                    }
                  }
                }
              }
            },
            "components": {
              "schemas": {
                "MapperJson": {
                  "type": "object",
                  "properties": {
                    "id": {
                      "type": "string",
                      "example": "12345"
                    },
                    "data": {
                      "type": "object",
                      "additionalProperties": true,
                      "example": {
                        "name": "sample"
                      }
                    }
                  }
                }
              }
            }
          }
          EOF

          echo "✅ OpenAPI spec generated"

      # ------------------------------------------------------------
      # Validate OpenAPI Spec
      # ------------------------------------------------------------
      - name: Validate OpenAPI structure
        shell: bash
        run: |
          OPENAPI_VERSION=$(jq -r '.openapi' fixed_spec.json)
          INFO_VERSION=$(jq -r '.info.version' fixed_spec.json)

          echo "OpenAPI Version: $OPENAPI_VERSION"
          echo "Info Version: $INFO_VERSION"

          if [ "$OPENAPI_VERSION" != "3.0.3" ]; then
            echo "❌ Invalid OpenAPI version"
            exit 1
          fi

          if [ "$INFO_VERSION" != "1.0.0" ]; then
            echo "❌ Invalid semantic version"
            exit 1
          fi

          echo "✅ OpenAPI validation successful"

      # ------------------------------------------------------------
      # Start Mock Central Registry
      # ------------------------------------------------------------
      - name: Start Mock Central Registry
        shell: bash
        run: |
          cat > mock_registry.py << 'EOF'
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json

          class MockRegistry(BaseHTTPRequestHandler):

              def do_POST(self):

                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length).decode('utf-8')

                  print("\n==============================")
                  print("POST Request Received")
                  print("==============================")
                  print("Path:", self.path)
                  print("Headers:", self.headers)
                  print("Body:", body)
                  print("==============================\n")

                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()

                  response = {
                      "status": "success",
                      "mock": True,
                      "path": self.path
                  }

                  self.wfile.write(json.dumps(response).encode())

              def log_message(self, format, *args):
                  return

          print("🚀 Mock Central Registry running on port 8085")

          HTTPServer(("0.0.0.0", 8085), MockRegistry).serve_forever()
          EOF

          nohup python3 mock_registry.py > mock_registry.log 2>&1 &

          sleep 5

          echo "✅ Mock Registry Started"

      # ------------------------------------------------------------
      # Register API with Central Registry
      # ------------------------------------------------------------
      - name: Register API with Central Registry
        shell: bash
        run: |
          curl --fail --show-error --silent \
            -X POST "$CENTRAL_REGISTRY_URL/registry/apis/register-file" \
            -F "apiName=jsonmap-service" \
            -F "description=JSON Mapping Service" \
            -F "gitRepository=${{ github.repository }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "breakingChange=false" \
            -F "collectionFile=@fixed_spec.json;type=application/json"

          echo "✅ API Registered"

      # ------------------------------------------------------------
      # Register Environment
      # ------------------------------------------------------------
      - name: Register Environment
        shell: bash
        run: |
          curl --fail --show-error --silent \
            -X POST "$CENTRAL_REGISTRY_URL/registry/environments" \
            -H "Content-Type: application/json" \
            -d '{
              "envName": "${{ steps.version.outputs.environment }}",
              "baseUrl": "http://localhost:8084"
            }'

          echo "✅ Environment Registered"

      # ------------------------------------------------------------
      # Mark Deployment
      # ------------------------------------------------------------
      - name: Mark API Deployment
        shell: bash
        run: |
          curl --fail --show-error --silent \
            -X POST "$CENTRAL_REGISTRY_URL/registry/apis/deploy" \
            -H "Content-Type: application/json" \
            -d '{
              "apiName": "jsonmap-service",
              "version": "${{ steps.version.outputs.version }}",
              "environment": "${{ steps.version.outputs.environment }}",
              "baseUrl": "http://localhost:8084"
            }'

          echo "✅ Deployment Marked"

      # ------------------------------------------------------------
      # Import OpenAPI into Postman
      # ------------------------------------------------------------
      - name: Import OpenAPI as Postman Collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        shell: bash
        run: |
          echo "📦 Importing OpenAPI into Postman..."

          RESPONSE=$(curl --silent --location \
            --request POST "https://api.getpostman.com/import/openapi?workspaceId=$POSTMAN_WORKSPACE_ID" \
            --header "X-Api-Key: $POSTMAN_API_KEY" \
            --form "type=file" \
            --form "input=@fixed_spec.json")

          echo "--------------------------------------"
          echo "Postman Response"
          echo "--------------------------------------"

          echo "$RESPONSE" | jq '.'

          echo "--------------------------------------"

          # Fail if .error exists
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Postman import failed"
            exit 1
          fi

          # Fail if status >= 400
          STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')

          if [[ "$STATUS" =~ ^[0-9]+$ ]] && [ "$STATUS" -ge 400 ]; then
            echo "❌ Postman API returned HTTP error"
            exit 1
          fi

          echo "✅ OpenAPI imported successfully into Postman"

      # ------------------------------------------------------------
      # Workflow Completed
      # ------------------------------------------------------------
      - name: Workflow Completed
        run: |
          echo "🎉 API Registration Workflow Completed Successfully"

