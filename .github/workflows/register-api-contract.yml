name: Register JSON Map Service API

on:
  push:
    branches: [main, dev, "release/**"]
    tags: ["v*"]

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine environment and version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" 
            VERSION=${VERSION#refs/tags/}
            ENVIRONMENT="prod"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENVIRONMENT="uat"
            VERSION="${{ github.ref }}"
            VERSION=${VERSION#refs/heads/release/}
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            ENVIRONMENT="staging"
            VERSION="main-$(date +%s)"
          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            ENVIRONMENT="dev"
            VERSION="dev-$(date +%s)"
          else
            ENVIRONMENT="dev"
            VERSION="pr-${{ github.event.pull_request.number }}"
          fi
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify OpenAPI spec file exists
        run: |
          if [ ! -f "postman/jsonmap.postman_collection.json" ]; then
            echo "❌ ERROR: OpenAPI spec not found at postman/jsonmap.postman_collection.json"
            exit 1
          fi
          echo "✅ OpenAPI spec file found."

      # ---------- Mock Central Registry (remove when real registry is available) ----------
      - name: Start mock Central Registry for testing
        run: |
          python3 -c "
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          class MockRegistry(BaseHTTPRequestHandler):
              def do_POST(self):
                  self.send_response(200)
                  self.send_header('Content-type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({'status': 'ok', 'mock': True}).encode())
              def log_message(self, format, *args):
                  pass
          HTTPServer(('', 8085), MockRegistry).serve_forever()
          " &
          sleep 3
          echo "✅ Mock registry running on port 8085"

      - name: Register API with Central Registry
        run: |
          curl -X POST "${{ secrets.CENTRAL_REGISTRY_URL }}/registry/apis/register-file" \
            -F "apiName=jsonmap-service" \
            -F "description=JSON Mapping Service" \
            -F "gitRepository=${{ github.repository }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "breakingChange=false" \
            -F "collectionFile=@postman/jsonmap.postman_collection.json;type=application/json"

      - name: Register environment
        run: |
          curl -X POST "${{ secrets.CENTRAL_REGISTRY_URL }}/registry/environments" \
            -H "Content-Type: application/json" \
            -d '{
              "envName": "${{ steps.version.outputs.environment }}",
              "baseUrl": "${{ secrets.SERVICE_BASE_URL }}"
            }' || true

      - name: Mark API Deployment
        run: |
          curl -X POST "${{ secrets.CENTRAL_REGISTRY_URL }}/registry/apis/deploy" \
            -H "Content-Type: application/json" \
            -d '{
              "apiName": "jsonmap-service",
              "version": "${{ steps.version.outputs.version }}",
              "environment": "${{ steps.version.outputs.environment }}",
              "baseUrl": "${{ secrets.SERVICE_BASE_URL }}"
            }'

      # ---------- Postman: Create or Update API SPECIFICATION (appears under "APIs" tab) ----------
      - name: Create or Update API Specification
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        run: |
          SPEC_FILE="postman/jsonmap.postman_collection.json"
          if [ ! -f "$SPEC_FILE" ]; then
            echo "⚠️ No OpenAPI spec file found at $SPEC_FILE – skipping"
            exit 0
          fi

          SPEC_NAME="JSON Map Service API"
          SPEC_VERSION="1.0.0"

          echo "Fetching existing specs in workspace $POSTMAN_WORKSPACE_ID..."

          # Make the API call and capture HTTP status and body
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET "https://api.getpostman.com/specs?workspace=$POSTMAN_WORKSPACE_ID" \
            -H "X-Api-Key: $POSTMAN_API_KEY" \
            -H "Accept: application/vnd.api.v10+json")

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Failed to fetch specs. Status: $HTTP_STATUS"
            echo "Response: $HTTP_BODY"
            exit 1
          fi

          # Check if response is valid JSON and contains specs
          if ! echo "$HTTP_BODY" | jq empty 2>/dev/null; then
            echo "❌ Invalid JSON response from Postman API:"
            echo "$HTTP_BODY"
            exit 1
          fi

          SPEC_ID=$(echo "$HTTP_BODY" | jq -r --arg NAME "$SPEC_NAME" '.specs[] | select(.name == $NAME) | .id // empty')

          if [ -z "$SPEC_ID" ]; then
            echo "Creating new API specification..."
            CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.getpostman.com/specs" \
              -H "X-Api-Key: $POSTMAN_API_KEY" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.api.v10+json" \
              -d '{
                "spec": {
                  "name": "'"$SPEC_NAME"'",
                  "version": "'"$SPEC_VERSION"'",
                  "type": "openapi3_1",
                  "content": '"$(jq -c . "$SPEC_FILE")"'
                }
              }')
            HTTP_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
            HTTP_STATUS=$(echo "$CREATE_RESPONSE" | tail -n1)
            if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
              echo "❌ Failed to create spec. Status: $HTTP_STATUS"
              echo "Response: $HTTP_BODY"
              exit 1
            fi
            echo "✅ API specification created."
          else
            echo "Updating existing API specification (ID: $SPEC_ID)..."
            NEW_VERSION="1.0.$(date +%s)"
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT "https://api.getpostman.com/specs/$SPEC_ID" \
              -H "X-Api-Key: $POSTMAN_API_KEY" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.api.v10+json" \
              -d '{
                "spec": {
                  "name": "'"$SPEC_NAME"'",
                  "version": "'"$NEW_VERSION"'",
                  "type": "openapi3_1",
                  "content": '"$(jq -c . "$SPEC_FILE")"'
                }
              }')
            HTTP_BODY=$(echo "$UPDATE_RESPONSE" | head -n -1)
            HTTP_STATUS=$(echo "$UPDATE_RESPONSE" | tail -n1)
            if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
              echo "❌ Failed to update spec. Status: $HTTP_STATUS"
              echo "Response: $HTTP_BODY"
              exit 1
            fi
            echo "✅ API specification updated to version $NEW_VERSION."
          fi
