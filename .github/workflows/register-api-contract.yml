name: Register JSON Map Service API

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    tags:
      - "v*"

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API code (camel)
        uses: actions/checkout@v3
        with:
          path: ./camel

      - name: Checkout Central Registry code (chil)
        uses: actions/checkout@v3
        with:
          repository: santhuakula7816/chil # Adjust to your username/repo
          path: ./chil

      - name: Start Central Registry
        run: |
          cd ./chil
          chmod +x gradlew
          # Run in background
          ./gradlew bootRun &
          cd ..
          # Wait for registry to be ready on port 8085
          for i in {1..30}; do
            curl -f http://localhost:8085/actuator/health && break || sleep 2
          done

      - name: Determine environment and version (from camel repo)
        working-directory: ./camel
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" 
            VERSION=${VERSION#refs/tags/}
            ENVIRONMENT="prod"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENVIRONMENT="uat"
            VERSION="${{ github.ref }}"
            VERSION=${VERSION#refs/heads/release/}
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            ENVIRONMENT="staging"
            VERSION="main-$(date +%s)"
          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            ENVIRONMENT="dev"
            VERSION="dev-$(date +%s)"
          else
            ENVIRONMENT="dev"
            VERSION="pr-${{ github.event.pull_request.number }}"
          fi

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Postman collection exists
        working-directory: ./camel
        run: |
          if [ ! -f "postman/jsonmap.postman_collection.json" ]; then
            echo "❌ ERROR: Postman collection not found at postman/jsonmap.postman_collection.json"
            exit 1
          fi

      - name: Register API with Central Registry
        working-directory: ./camel
        run: |
          curl -X POST "http://localhost:8085/registry/apis/register-file" \
            -F "apiName=jsonmap-service" \
            -F "description=JSON Mapping Service" \
            -F "gitRepository=${{ github.repository }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "breakingChange=false" \
            -F "collectionFile=@postman/jsonmap.postman_collection.json;type=application/json"

      - name: Register environment
        working-directory: ./camel
        run: |
          curl -X POST "http://localhost:8085/registry/environments" \
            -H "Content-Type: application/json" \
            -d '{
              "envName": "${{ steps.version.outputs.environment }}",
              "baseUrl": "${{ secrets.SERVICE_BASE_URL }}"
            }' || true

      - name: Mark API Deployment
        working-directory: ./camel
        run: |
          curl -X POST "http://localhost:8085/registry/apis/deploy" \
            -H "Content-Type: application/json" \
            -d '{
              "apiName": "jsonmap-service",
              "version": "${{ steps.version.outputs.version }}",
              "environment": "${{ steps.version.outputs.environment }}",
              "baseUrl": "${{ secrets.SERVICE_BASE_URL }}"
            }'
