name: Register JSON Map Service API

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    tags:
      - "v*"

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Determine Environment + Version
      # ------------------------------------------------------------
      - name: Determine environment and version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            ENVIRONMENT="prod"

          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            VERSION="${GITHUB_REF#refs/heads/release/}"
            ENVIRONMENT="uat"

          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            VERSION="main-$(date +%s)"
            ENVIRONMENT="staging"

          elif [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            VERSION="dev-$(date +%s)"
            ENVIRONMENT="dev"

          else
            VERSION="snapshot-$(date +%s)"
            ENVIRONMENT="dev"
          fi

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION"

      # ------------------------------------------------------------
      # Verify OpenAPI File
      # ------------------------------------------------------------
      - name: Verify OpenAPI spec file exists
        shell: bash
        run: |
          if [ ! -f "postman/jsonmap.postman_collection.json" ]; then
            echo "❌ ERROR: OpenAPI file not found"
            exit 1
          fi

          echo "✅ OpenAPI spec file found"

      # ------------------------------------------------------------
      # Install jq
      # ------------------------------------------------------------
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ------------------------------------------------------------
      # Prepare Valid OpenAPI Spec
      # ------------------------------------------------------------
      - name: Prepare OpenAPI spec
        shell: bash
        run: |
          ORIGINAL_FILE="postman/jsonmap.postman_collection.json"
          FIXED_FILE="fixed_spec.json"

          cp "$ORIGINAL_FILE" "$FIXED_FILE"

          echo "Original File:"
          cat "$FIXED_FILE"

          # Force OpenAPI Version
          jq '.openapi = "3.0.3"' "$FIXED_FILE" > tmp.json && mv tmp.json "$FIXED_FILE"

          # Add jsonSchemaDialect
          jq '.jsonSchemaDialect = "https://spec.openapis.org/oas/3.0/dialect/base"' "$FIXED_FILE" > tmp.json && mv tmp.json "$FIXED_FILE"

          # Force semantic version
          jq '.info.version = "1.0.0"' "$FIXED_FILE" > tmp.json && mv tmp.json "$FIXED_FILE"

          # Force title if missing
          jq '.info.title = "JSON Map Service API"' "$FIXED_FILE" > tmp.json && mv tmp.json "$FIXED_FILE"

          # Fix additionalProperties issue
          jq '
            .components.schemas.MapperJson.properties.data.additionalProperties = true
          ' "$FIXED_FILE" > tmp.json && mv tmp.json "$FIXED_FILE"

          echo "-----------------------------------"
          echo "Validated OpenAPI File"
          echo "-----------------------------------"

          cat "$FIXED_FILE"

          echo "-----------------------------------"

          echo "OpenAPI Version:"
          jq -r '.openapi' "$FIXED_FILE"

          echo "Info Version:"
          jq -r '.info.version' "$FIXED_FILE"

      # ------------------------------------------------------------
      # Validate OpenAPI JSON
      # ------------------------------------------------------------
      - name: Validate OpenAPI structure
        shell: bash
        run: |
          SPEC_FILE="fixed_spec.json"

          OPENAPI_VERSION=$(jq -r '.openapi' "$SPEC_FILE")
          INFO_VERSION=$(jq -r '.info.version' "$SPEC_FILE")

          if [ "$OPENAPI_VERSION" == "null" ]; then
            echo "❌  Missing openapi version"
            exit 1
          fi

          if [ "$INFO_VERSION" == "null" ]; then
            echo "❌ Missing info.version"
            exit 1
          fi

          echo "✅ OpenAPI validation successful"

      # ------------------------------------------------------------
      # Register API with Central Registry
      # ------------------------------------------------------------
      - name: Register API with Central Registry
        shell: bash
        run: |
          curl -X POST "${{ secrets.CENTRAL_REGISTRY_URL }}/registry/apis/register-file" \
            -F "apiName=jsonmap-service" \
            -F "description=JSON Mapping Service" \
            -F "gitRepository=${{ github.repository }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "breakingChange=false" \
            -F "collectionFile=@fixed_spec.json;type=application/json"

      # ------------------------------------------------------------
      # Register Environment
      # ------------------------------------------------------------
      - name: Register Environment
        shell: bash
        run: |
          curl -X POST "${{ secrets.CENTRAL_REGISTRY_URL }}/registry/environments" \
            -H "Content-Type: application/json" \
            -d '{
              "envName": "${{ steps.version.outputs.environment }}",
              "baseUrl": "${{ secrets.SERVICE_BASE_URL }}"
            }'

      # ------------------------------------------------------------
      # Mark Deployment
      # ------------------------------------------------------------
      - name: Mark API Deployment
        shell: bash
        run: |
          curl -X POST "${{ secrets.CENTRAL_REGISTRY_URL }}/registry/apis/deploy" \
            -H "Content-Type: application/json" \
            -d '{
              "apiName": "jsonmap-service",
              "version": "${{ steps.version.outputs.version }}",
              "environment": "${{ steps.version.outputs.environment }}",
              "baseUrl": "${{ secrets.SERVICE_BASE_URL }}"
            }'

      # ------------------------------------------------------------
      # Import OpenAPI into Postman
      # ------------------------------------------------------------
      - name: Import OpenAPI as Postman Collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        shell: bash
        run: |
          SPEC_FILE="fixed_spec.json"

          echo "📦 Importing OpenAPI into Postman..."

          echo "Workspace: $POSTMAN_WORKSPACE_ID"

          RESPONSE=$(curl -s -X POST \
            "https://api.getpostman.com/import/openapi?workspaceId=$POSTMAN_WORKSPACE_ID" \
            -H "X-Api-Key: $POSTMAN_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @"$SPEC_FILE")

          echo "-----------------------------------"
          echo "Postman Response"
          echo "-----------------------------------"

          echo "$RESPONSE" | jq '.'

          echo "-----------------------------------"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Postman Import Failed"
            exit 1
          fi

          echo "✅ OpenAPI imported successfully"

      # ------------------------------------------------------------
      # Success
      # ------------------------------------------------------------
      - name: Completed
        run: |
          echo "✅ API Registration Completed Successfully"
