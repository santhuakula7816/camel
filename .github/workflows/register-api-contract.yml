name: Register JSON Map Service API

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "*"

jobs:
  register:
    runs-on: ubuntu-latest

    env:
      CENTRAL_REGISTRY_URL: https://be07-183-82-123-72.ngrok-free.app

    steps:
      # ------------------------------------------------------------
      # CHECKOUT
      # ------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # INSTALL DEPENDENCIES
      # ------------------------------------------------------------
      - name: Install jq and curl
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      # ------------------------------------------------------------
      # SETUP NODE (for openapi-to-postmanv2)
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install OpenAPI to Postman Converter
        run: npm install -g openapi-to-postmanv2

      # ------------------------------------------------------------
      # SETUP JAVA
      # ------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ------------------------------------------------------------
      # BUILD WITH GRADLE (Groovy)
      # ------------------------------------------------------------
      - name: Build with Gradle
        run: |
          # Use the Gradle wrapper if it exists, otherwise use system Gradle
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean build -x test
          else
            gradle clean build -x test
          fi

      # ------------------------------------------------------------
      # START SPRING BOOT APPLICATION
      # ------------------------------------------------------------
      - name: Start Spring Boot Application
        run: |
          # Find the JAR file (Gradle puts it in build/libs)
          JAR_FILE=$(find build/libs -name "*.jar" 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No JAR found in build/libs/ - did the build succeed?"
            exit 1
          fi
          echo "Starting JAR: $JAR_FILE"
          java -jar "$JAR_FILE" &
          sleep 30
          # Wait for OpenAPI endpoint to become available
          for i in {1..15}; do
            if curl -s http://localhost:8084/v3/api-docs > /dev/null; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for app... ($i/15)"
            sleep 5
          done

      # ------------------------------------------------------------
      # DETERMINE VERSION, ENVIRONMENT, MODE
      # ------------------------------------------------------------
      - name: Determine version, environment and mode
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            MODE="NEW_VERSION"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "snapshot")
            MODE="UPDATE_VERSION"
          fi

          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            ENVIRONMENT="prod"
          elif [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            ENVIRONMENT="dev"
          else
            ENVIRONMENT="prod"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

          echo "--------------------------------------"
          echo "VERSION=$VERSION"
          echo "MODE=$MODE"
          echo "ENVIRONMENT=$ENVIRONMENT"
          echo "--------------------------------------"

      # ------------------------------------------------------------
      # FETCH OPENAPI SPEC FROM RUNNING APP
      # ------------------------------------------------------------
      - name: Fetch OpenAPI Spec from /v3/api-docs
        shell: bash
        run: |
          mkdir -p openapi
          curl --fail --silent --show-error \
            http://localhost:8084/v3/api-docs \
            --output openapi/raw_spec.json
          if [ ! -s openapi/raw_spec.json ]; then
            echo "❌ OpenAPI spec is empty"
            exit 1
          fi
          jq empty openapi/raw_spec.json
          echo "✅ OpenAPI spec fetched"

      # ------------------------------------------------------------
      # PREPARE OPENAPI FOR POSTMAN (add operationId if missing)
      # ------------------------------------------------------------
      - name: Prepare OpenAPI for Postman conversion
        shell: bash
        run: |
          cp openapi/raw_spec.json openapi/postman_ready.json
          jq '.paths |= with_entries(
            .value |= with_entries(
              .value.operationId //= (.key + "_" + (.value.operationId // ""))
            )
          )' openapi/raw_spec.json > openapi/postman_ready.json
          echo "✅ OpenAPI prepared"

      # ------------------------------------------------------------
      # CONVERT TO POSTMAN COLLECTION
      # ------------------------------------------------------------
      - name: Convert OpenAPI to Postman Collection
        shell: bash
        run: |
          mkdir -p generated
          openapi2postmanv2 \
            -s openapi/postman_ready.json \
            -o generated/postman_collection.json \
            -p
          echo "✅ Postman collection generated"

      # ------------------------------------------------------------
      # VALIDATE COLLECTION
      # ------------------------------------------------------------
      - name: Validate Postman Collection
        shell: bash
        run: |
          ITEM_COUNT=$(jq '.item | length' generated/postman_collection.json)
          if [ "$ITEM_COUNT" == "null" ] || [ "$ITEM_COUNT" -eq 0 ]; then
            echo "❌ Invalid collection"
            exit 1
          fi
          echo "✅ Collection contains $ITEM_COUNT endpoints"

      # ------------------------------------------------------------
      # REGISTER METADATA TO CENTRAL REGISTRY (without collection UID)
      # ------------------------------------------------------------
      - name: Register API Pipeline Metadata
        shell: bash
        run: |
          curl --silent --show-error \
            --request POST "${CENTRAL_REGISTRY_URL}/registry/pipeline/register" \
            --form "apiName=jsonmap-service" \
            --form "description=JSON Mapping Service" \
            --form "gitRepository=https://github.com/${{ github.repository }}" \
            --form "version=${{ steps.version.outputs.version }}" \
            --form "environment=${{ steps.version.outputs.environment }}" \
            --form "baseUrl=http://localhost:8084" \
            --form "breakingChange=false" \
            --form "collectionFile=@generated/postman_collection.json;type=application/json"

      # ------------------------------------------------------------
      # SYNC COLLECTION TO POSTMAN (VERSION FOLDER OVERRIDE)
      # ------------------------------------------------------------
      - name: Sync Collection to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_FOLDER="${VERSION}"
          ROOT_COLLECTION_NAME="jsonmap-service"

          # Find or create root collection
          SEARCH_RESPONSE=$(curl --silent \
            --request GET "https://api.getpostman.com/collections" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}")

          EXISTING_UID=$(echo "$SEARCH_RESPONSE" | jq -r \
            --arg NAME "$ROOT_COLLECTION_NAME" \
            '.collections[] | select(.name==$NAME) | .uid' | head -1)

          if [ -z "$EXISTING_UID" ] || [ "$EXISTING_UID" == "null" ]; then
            echo "Creating root collection: ${ROOT_COLLECTION_NAME}"
            cat > root_collection.json << EOF
            {
              "collection": {
                "info": {
                  "name": "$ROOT_COLLECTION_NAME",
                  "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
                },
                "item": []
              }
            }
            EOF
            CREATE_RESPONSE=$(curl --silent \
              --request POST "https://api.getpostman.com/collections?workspace=${POSTMAN_WORKSPACE_ID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @root_collection.json)
            EXISTING_UID=$(echo "$CREATE_RESPONSE" | jq -r '.collection.uid')
          fi

          echo "Root collection UID: ${EXISTING_UID}"

          # Download existing collection
          curl --silent \
            --request GET "https://api.getpostman.com/collections/${EXISTING_UID}" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}" \
            > existing_collection.json

          # Create version folder
          jq --arg versionFolder "$VERSION_FOLDER" '{
            name: $versionFolder,
            item: .item
          }' generated/postman_collection.json > version_folder.json

          # Check if version folder exists → remove if yes (override)
          VERSION_EXISTS=$(jq -r \
            --arg versionFolder "$VERSION_FOLDER" \
            '.collection.item[]?.name | select(. == $versionFolder)' \
            existing_collection.json)

          if [ ! -z "$VERSION_EXISTS" ]; then
            echo "♻️ Overriding existing version folder: ${VERSION_FOLDER}"
            jq --arg versionFolder "$VERSION_FOLDER" '
              .collection.item |= map(select(.name != $versionFolder))
            ' existing_collection.json > cleaned_collection.json
          else
            cp existing_collection.json cleaned_collection.json
          fi

          # Append new version folder
          jq --slurpfile folder version_folder.json '
            .collection.item += $folder
          ' cleaned_collection.json > updated_collection.json

          # Upload to Postman
          RESPONSE=$(curl --silent \
            --request PUT "https://api.getpostman.com/collections/${EXISTING_UID}" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @updated_collection.json)

          echo "$RESPONSE" | jq '.'

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Postman collection sync failed"
            exit 1
          fi

          # Capture UID and update registry
          COLLECTION_UID=$(echo "$RESPONSE" | jq -r '.collection.uid')
          echo "Captured collection UID: ${COLLECTION_UID}"

          curl --silent --show-error \
            --request POST "${CENTRAL_REGISTRY_URL}/registry/update-collection" \
            --form "apiName=jsonmap-service" \
            --form "version=${{ steps.version.outputs.version }}" \
            --form "environment=${{ steps.version.outputs.environment }}" \
            --form "collectionUid=${COLLECTION_UID}" \
            --form "collectionId=$(echo "$COLLECTION_UID" | cut -d'-' -f2-)"

          echo "✅ Postman collection synced and UID stored"

      # ------------------------------------------------------------
      # SYNC POSTMAN ENVIRONMENT (FETCH BASEURL FROM REGISTRY DB)
      # ------------------------------------------------------------
      - name: Sync Postman Environment
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
          CENTRAL_REGISTRY_URL: ${{ env.CENTRAL_REGISTRY_URL }}
        shell: bash
        run: |
          ENVIRONMENT="${{ steps.version.outputs.environment }}"
          API_NAME="jsonmap-service"
          ENV_NAME="${API_NAME}-${ENVIRONMENT}"

          echo "Fetching environment config from registry for ${API_NAME}/${ENVIRONMENT}"
          ENV_CONFIG=$(curl --silent --show-error \
            "${CENTRAL_REGISTRY_URL}/registry/environment/${API_NAME}/${ENVIRONMENT}" || echo "")

          if [ -z "$ENV_CONFIG" ] || [ "$(echo "$ENV_CONFIG" | jq -r '.baseUrl')" == "null" ]; then
            echo "❌ Failed to fetch environment configuration. Ensure endpoint returns JSON with 'baseUrl'."
            exit 1
          fi

          BASE_URL=$(echo "$ENV_CONFIG" | jq -r '.baseUrl')
          echo "Using baseUrl: ${BASE_URL}"

          # Create/update Postman environment
          SEARCH_ENV=$(curl --silent \
            --request GET "https://api.getpostman.com/environments?workspace=${POSTMAN_WORKSPACE_ID}" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}")

          EXISTING_ENV_UID=$(echo "$SEARCH_ENV" | jq -r --arg NAME "$ENV_NAME" \
            '.environments[] | select(.name==$NAME) | .uid' | head -1)

          cat > postman_environment.json << EOF
          {
            "environment": {
              "name": "$ENV_NAME",
              "values": [
                { "key": "baseUrl", "value": "$BASE_URL", "enabled": true, "type": "default" },
                { "key": "apiVersion", "value": "${{ steps.version.outputs.version }}", "enabled": true, "type": "default" }
              ]
            }
          }
          EOF

          if [ -z "$EXISTING_ENV_UID" ] || [ "$EXISTING_ENV_UID" == "null" ]; then
            curl --silent --show-error \
              --request POST "https://api.getpostman.com/environments?workspace=${POSTMAN_WORKSPACE_ID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @postman_environment.json
            echo "✅ Created Postman environment: ${ENV_NAME}"
          else
            curl --silent --show-error \
              --request PUT "https://api.getpostman.com/environments/${EXISTING_ENV_UID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @postman_environment.json
            echo "✅ Updated Postman environment: ${ENV_NAME}"
          fi

      # ------------------------------------------------------------
      # COMPLETED
      # ------------------------------------------------------------
      - name: Workflow Completed
        run: |
          echo "🎉 Workflow completed successfully"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Environment: ${{ steps.version.outputs.environment }}"
