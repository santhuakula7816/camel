name: Register API with Central Registry

on:
  push:
    branches:
      - main
      - dev
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - dev

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine environment and version
        id: version
        run: |
          # Determine deployment environment based on branch/tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" 
            VERSION=${VERSION#refs/tags/}
            ENVIRONMENT="prod"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENVIRONMENT="uat"
            VERSION="${{ github.ref }}"
            VERSION=${VERSION#refs/heads/release/}
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            ENVIRONMENT="staging"
            VERSION="main-$(date +%s)"
          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            ENVIRONMENT="dev"
            VERSION="dev-$(date +%s)"
          else
            ENVIRONMENT="dev"
            VERSION="pr-${{ github.event.pull_request.number }}"
          fi
          
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Register API with Central Registry
        run: |
          # Register Postman collection
          curl -X POST "${{ secrets.REGISTRY_URL }}/registry/apis/register-file" \
            -H "Authorization: Bearer ${{ secrets.REGISTRY_TOKEN }}" \
            -F "file=@postman-collections/policy-service.postman_collection.json" \
            -F "apiName=policy-service" \
            -F "apiVersion=${{ steps.version.outputs.version }}" \
            -F "gitRepository=${{ github.repository }}" \
            -F "description=Insurance Policy Management Service" \
            -F "breakingChange=false"

      - name: Mark API Deployment
        run: |
          curl -X POST "${{ secrets.REGISTRY_URL }}/registry/apis/deploy" \
            -H "Authorization: Bearer ${{ secrets.REGISTRY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "apiName": "policy-service",
              "version": "${{ steps.version.outputs.version }}",
              "environment": "${{ steps.version.outputs.environment }}"
            }'