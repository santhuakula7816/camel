name: Register JSON Map Service API

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "*"

jobs:
  register:
    runs-on: ubuntu-latest

    env:
      CENTRAL_REGISTRY_URL: https://be07-183-82-123-72.ngrok-free.app

    steps:
      # ------------------------------------------------------------
      # CHECKOUT
      # ------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # INSTALL jq
      # ------------------------------------------------------------
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ------------------------------------------------------------
      # SETUP NODE
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ------------------------------------------------------------
      # INSTALL OPENAPI CONVERTER
      # ------------------------------------------------------------
      - name: Install OpenAPI Converter
        run: |
          npm install -g openapi-to-postmanv2

      # ------------------------------------------------------------
      # DETERMINE VERSION + MODE
      # ------------------------------------------------------------
      - name: Determine version and mode
        id: version
        shell: bash
        run: |

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then

            VERSION="${GITHUB_REF#refs/tags/}"
            MODE="NEW_VERSION"

          else

            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "snapshot")
            MODE="UPDATE_VERSION"

          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT

          echo "--------------------------------------"
          echo "VERSION=$VERSION"
          echo "MODE=$MODE"
          echo "--------------------------------------"

      # ------------------------------------------------------------
      # GENERATE OPENAPI SPEC
      # ------------------------------------------------------------
      - name: Generate OpenAPI Spec
        shell: bash
        run: |

          mkdir -p openapi

          VERSION="${{ steps.version.outputs.version }}"

          cat > openapi/fixed_spec.json << EOF
          {
            "openapi": "3.0.3",
            "info": {
              "title": "JSON Map Service API",
              "version": "$VERSION",
              "description": "API for managing JSON mapping data"
            },
            "servers": [
              {
                "url": "http://localhost:8084",
                "description": "Local Development Server"
              }
            ],
            "paths": {

              "/json/getAllJsons": {
                "get": {
                  "tags": ["mapper-json-controller"],
                  "summary": "Get all JSON mappings",
                  "operationId": "getAllJsons",
                  "responses": {
                    "200": {
                      "description": "List of mappings",
                      "content": {
                        "application/json": {
                          "schema": {
                            "type": "array",
                            "items": {
                              "\$ref": "#/components/schemas/MapperJson"
                            }
                          }
                        }
                      }
                    }
                  }
                }
              },

              "/json/create": {
                "post": {
                  "tags": ["mapper-json-controller"],
                  "summary": "Create JSON mapping",
                  "operationId": "createMapping",

                  "requestBody": {
                    "required": true,
                    "content": {
                      "application/json": {
                        "schema": {
                          "\$ref": "#/components/schemas/MapperJson"
                        }
                      }
                    }
                  },

                  "responses": {
                    "200": {
                      "description": "Created successfully",
                      "content": {
                        "application/json": {
                          "schema": {
                            "\$ref": "#/components/schemas/MapperJson"
                          }
                        }
                      }
                    }
                  }
                }
              },

              "/json/{id}": {

                "put": {
                  "tags": ["mapper-json-controller"],
                  "summary": "Update JSON mapping",
                  "operationId": "updateMapping",

                  "parameters": [
                    {
                      "name": "id",
                      "in": "path",
                      "required": true,
                      "schema": {
                        "type": "string"
                      }
                    }
                  ],

                  "requestBody": {
                    "required": true,
                    "content": {
                      "application/json": {
                        "schema": {
                          "\$ref": "#/components/schemas/MapperJson"
                        }
                      }
                    }
                  },

                  "responses": {
                    "200": {
                      "description": "Updated successfully",
                      "content": {
                        "application/json": {
                          "schema": {
                            "\$ref": "#/components/schemas/MapperJson"
                          }
                        }
                      }
                    }
                  }
                },

                "delete": {
                  "tags": ["mapper-json-controller"],
                  "summary": "Delete JSON mapping",
                  "operationId": "deleteMapping",

                  "parameters": [
                    {
                      "name": "id",
                      "in": "path",
                      "required": true,
                      "schema": {
                        "type": "string"
                      }
                    }
                  ],

                  "responses": {
                    "200": {
                      "description": "Deleted successfully",
                      "content": {
                        "application/json": {
                          "schema": {
                            "\$ref": "#/components/schemas/DeleteResponse"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },

            "components": {
              "schemas": {

                "MapperJson": {
                  "type": "object",
                  "properties": {

                    "id": {
                      "type": "string",
                      "example": "123"
                    },

                    "name": {
                      "type": "string",
                      "example": "sample-mapping"
                    },

                    "data": {
                      "type": "object",
                      "additionalProperties": {
                        "type": "string"
                      },
                      "example": {
                        "source": "A",
                        "target": "B"
                      }
                    }
                  }
                },

                "DeleteResponse": {
                  "type": "object",
                  "properties": {

                    "status": {
                      "type": "string",
                      "example": "SUCCESS"
                    },

                    "message": {
                      "type": "string",
                      "example": "Deleted successfully"
                    }
                  }
                }
              }
            }
          }
          EOF

          echo "✅ OpenAPI Spec Generated"

      # ------------------------------------------------------------
      # VALIDATE OPENAPI
      # ------------------------------------------------------------
      - name: Validate OpenAPI Spec
        shell: bash
        run: |

          OPENAPI_VERSION=$(jq -r '.openapi' openapi/fixed_spec.json)

          if [ -z "$OPENAPI_VERSION" ] || [ "$OPENAPI_VERSION" == "null" ]; then
            echo "❌ Invalid OpenAPI"
            exit 1
          fi

          echo "✅ OpenAPI Validated"

      # ------------------------------------------------------------
      # CONVERT OPENAPI TO POSTMAN
      # ------------------------------------------------------------
      - name: Convert OpenAPI to Postman
        shell: bash
        run: |

          mkdir -p generated

          openapi2postmanv2 \
            -s openapi/fixed_spec.json \
            -o generated/postman_collection.json \
            -p

          echo "✅ Postman Collection Generated"

      # ------------------------------------------------------------
      # VALIDATE COLLECTION
      # ------------------------------------------------------------
      - name: Validate Collection
        shell: bash
        run: |

          ITEM_COUNT=$(jq '.item | length' generated/postman_collection.json)

          if [ "$ITEM_COUNT" == "null" ]; then
            echo "❌ Invalid Collection"
            exit 1
          fi

          echo "Endpoints Found: $ITEM_COUNT"

      # ------------------------------------------------------------
      # REGISTER TO REGISTRY SERVICE
      # ------------------------------------------------------------
      - name: Register API Pipeline
        shell: bash
        run: |

          RESPONSE=$(curl --location --silent --show-error \
            --request POST "${CENTRAL_REGISTRY_URL}/registry/pipeline/register" \
            --form "apiName=jsonmap-service" \
            --form "description=JSON Mapping Service" \
            --form "gitRepository=https://github.com/${{ github.repository }}" \
            --form "version=${{ steps.version.outputs.version }}" \
            --form "environment=prod" \
            --form "baseUrl=http://localhost:8084" \
            --form "breakingChange=false" \
            --form "collectionFile=@generated/postman_collection.json;type=application/json")

          echo "$RESPONSE"

      # ------------------------------------------------------------
      # SYNC TO POSTMAN
      # ------------------------------------------------------------
      - name: Sync Collection to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        shell: bash
        run: |

          VERSION="${{ steps.version.outputs.version }}"
          ENVIRONMENT="prod"

          ROOT_COLLECTION_NAME="jsonmap-service"

          VERSION_FOLDER="${VERSION}-${ENVIRONMENT}"

          echo "VERSION_FOLDER=$VERSION_FOLDER"

          # --------------------------------------------------------
          # SEARCH ROOT COLLECTION
          # --------------------------------------------------------
          SEARCH_RESPONSE=$(curl --silent \
            --request GET \
            "https://api.getpostman.com/collections" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}")

          EXISTING_UID=$(echo "$SEARCH_RESPONSE" | jq -r \
            --arg NAME "$ROOT_COLLECTION_NAME" \
            '.collections[] | select(.name==$NAME) | .uid' | head -1)

          # --------------------------------------------------------
          # CREATE ROOT COLLECTION
          # --------------------------------------------------------
          if [ -z "$EXISTING_UID" ] || [ "$EXISTING_UID" == "null" ]; then

            cat > root_collection.json << EOF
          {
            "collection": {
              "info": {
                "name": "$ROOT_COLLECTION_NAME",
                "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
              },
              "item": []
            }
          }
          EOF

            CREATE_RESPONSE=$(curl --silent \
              --request POST \
              "https://api.getpostman.com/collections?workspace=${POSTMAN_WORKSPACE_ID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @root_collection.json)

            EXISTING_UID=$(echo "$CREATE_RESPONSE" | jq -r '.collection.uid')
          fi

          # --------------------------------------------------------
          # DOWNLOAD EXISTING COLLECTION
          # --------------------------------------------------------
          curl --silent \
            --request GET \
            "https://api.getpostman.com/collections/${EXISTING_UID}" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}" \
            > existing_collection.json

          # --------------------------------------------------------
          # CREATE VERSION FOLDER
          # --------------------------------------------------------
          jq --arg versionFolder "$VERSION_FOLDER" '
          {
            name: $versionFolder,
            item: .item
          }
          ' generated/postman_collection.json > version_folder.json

          # --------------------------------------------------------
          # CHECK EXISTING VERSION
          # --------------------------------------------------------
          VERSION_EXISTS=$(jq -r \
            --arg versionFolder "$VERSION_FOLDER" \
            '.collection.item[]?.name | select(. == $versionFolder)' \
            existing_collection.json)

          # --------------------------------------------------------
          # SAME VERSION -> OVERRIDE
          # --------------------------------------------------------
          if [ ! -z "$VERSION_EXISTS" ]; then

            echo "♻️ Updating Existing Version"

            jq --arg versionFolder "$VERSION_FOLDER" '
            .collection.item |= map(select(.name != $versionFolder))
            ' existing_collection.json > cleaned_collection.json

          else

            echo "🆕 Creating New Version"

            cp existing_collection.json cleaned_collection.json

          fi

          # --------------------------------------------------------
          # APPEND VERSION FOLDER
          # --------------------------------------------------------
          jq --slurpfile folder version_folder.json '
          .collection.item += $folder
          ' cleaned_collection.json > updated_collection.json

          # --------------------------------------------------------
          # UPDATE COLLECTION
          # --------------------------------------------------------
          RESPONSE=$(curl --silent \
            --request PUT \
            "https://api.getpostman.com/collections/${EXISTING_UID}" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @updated_collection.json)

          echo "$RESPONSE" | jq '.'

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Postman Sync Failed"
            exit 1
          fi

          echo "✅ Postman Sync Successful"

      # ------------------------------------------------------------
      # COMPLETED
      # ------------------------------------------------------------
      - name: Workflow Completed
        run: |
          echo "🎉 Workflow Completed Successfully"
